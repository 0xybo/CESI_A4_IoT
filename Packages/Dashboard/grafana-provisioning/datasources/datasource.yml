apiVersion: 1
datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    editable: true

    basicAuth: true
    basicAuthUser: BigBossIoT
    basicAuthPassword: BigBossIoT1234

    jsonData:
      version: Flux
      organization: TestOrg
      defaultBucket: TestBucket
      tlsSkipVerify: true

    secureJsonData: {}
